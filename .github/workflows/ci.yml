name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Build synthetic fixtures
        run: python scripts/build_synthetic_fixtures.py

      - name: Run tests with coverage
        env:
          SVAMITVA_CONFIG_PATH: config/platform_config.synthetic.json
        run: |
          pytest --cov=src --cov=production --cov-report=term-missing --cov-fail-under=40

      - name: Reproduce evaluation pipeline
        env:
          SVAMITVA_CONFIG_PATH: config/platform_config.synthetic.json
        run: bash scripts/reproduce.sh

      - name: Verify eval artifact exists
        run: test -f outputs/calibrated_eval_results.json

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t svamitva-api:test .
